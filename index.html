<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samsons Procurement Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8922e;--gold-light:#d4aa4a;--gold-bg:rgba(184,146,46,0.08);
  --nav-bg:#162844;--nav-text:#e8e6e0;
  --bg:#f5f3ee;--surface:#ffffff;--surface2:#f5f3ee;
  --border:#dedad2;--border2:#ccc8be;
  --text:#1a1908;--text2:#6b6860;--text3:#9b9890;
  --success-bg:#eaf3de;--success-text:#3b6d11;
  --warn-bg:#faeeda;--warn-text:#854f0b;
  --danger-bg:#fcebeb;--danger-text:#a32d2d;
  --info-bg:#e6f1fb;--info-text:#185fa5;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
body.on-landing .nav,.nav{display:none}
body.on-landing .page{display:none!important}
body.on-landing #loading{display:none!important}
#entity-landing{width:100%;min-height:100vh;background:#162844;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
#entity-landing.hidden{display:none}
body:not(.on-landing) .nav{display:flex}
.el-brand{text-align:center;margin-bottom:32px}
.el-brand img{width:280px;max-width:80vw;height:auto;display:block;margin:0 auto 20px}
.el-brand h1{font-size:34px;font-weight:700;color:var(--gold);letter-spacing:.02em;margin-bottom:6px}
.el-brand p{font-size:12px;color:rgba(255,255,255,0.55);letter-spacing:.06em;text-transform:uppercase}
.el-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;max-width:900px;width:100%}
.el-card{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:34px 20px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.el-card::before{content:'';position:absolute;inset:0;background:var(--entity-color,var(--gold));opacity:0;transition:opacity .18s}
.el-card:hover{border-color:var(--entity-color,var(--gold));transform:translateY(-3px);background:rgba(255,255,255,0.13)}
.el-card:hover::before{opacity:.08}
.el-icon{font-size:44px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;position:relative}
.el-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;position:relative;letter-spacing:.02em}
.el-desc{font-size:13px;color:rgba(255,255,255,0.6);position:relative;letter-spacing:.03em}
@media(max-width:700px){.el-grid{grid-template-columns:repeat(2,1fr)}.el-card:last-child{grid-column:span 2}}
#pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:3000;display:none;align-items:center;justify-content:center}
#pin-overlay.open{display:flex}
#pin-box{background:#162844;border:1px solid rgba(184,146,46,0.4);border-radius:14px;padding:32px 28px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
#pin-entity-name{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:4px}
#pin-subtitle{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:20px;letter-spacing:.05em;text-transform:uppercase}
#pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:transparent;transition:background .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
#pin-error{font-size:11px;color:#e05c5c;min-height:16px;margin-bottom:10px;font-weight:500}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.pin-key{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:16px;font-weight:600;padding:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.pin-key:hover{background:rgba(255,255,255,0.16);border-color:rgba(184,146,46,0.5)}
.pin-key:active{transform:scale(0.95)}
.pin-key.del{font-size:13px;color:rgba(255,255,255,0.6)}
.pin-cancel{width:100%;background:transparent;border:0.5px solid rgba(255,255,255,0.2);border-radius:8px;color:rgba(255,255,255,0.5);font-size:12px;padding:9px;cursor:pointer;font-family:inherit}
.pin-cancel:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.8)}
.entity-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;border:0.5px solid #444;cursor:pointer;margin-right:12px;transition:border-color .15s;flex-shrink:0}
.entity-badge:hover{border-color:var(--gold)}
.entity-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}
.entity-badge-name{font-size:11px;font-weight:600;color:var(--nav-text)}
.entity-badge-change{font-size:10px;color:#666}
.nav{height:50px;background:var(--nav-bg);align-items:center;padding:0 20px;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.25)}
.nav-brand{font-size:13px;font-weight:600;color:var(--nav-text);margin-right:22px;white-space:nowrap;letter-spacing:.02em}
.nav-tabs{display:flex;gap:2px;flex:1;flex-wrap:wrap}
.nav-tab{padding:6px 13px;border-radius:6px;font-size:12px;border:none;background:none;color:rgba(255,255,255,0.55);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-tab:hover{background:rgba(255,255,255,0.08);color:var(--nav-text)}
.nav-tab.active{background:rgba(184,146,46,0.22);color:var(--gold);font-weight:600}
.ntag{font-size:10px;padding:1px 6px;border-radius:8px;margin-left:3px;font-weight:600}
.ntag-p{background:var(--info-bg);color:var(--info-text)}
.ntag-g{background:var(--success-bg);color:var(--success-text)}
#loading{position:fixed;inset:0;background:var(--nav-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
#loading .logo{font-size:22px;font-weight:700;color:var(--nav-text);letter-spacing:.04em}
#loading .logo span{color:var(--gold)}
#loading .sub{font-size:12px;color:#888}
#loading .bar{width:200px;height:2px;background:#333;border-radius:2px;overflow:hidden}
#loading .bar-inner{height:100%;background:var(--gold);border-radius:2px;animation:load 1.2s ease-out forwards}
@keyframes load{from{width:0}to{width:100%}}
#loading.hidden{display:none}
.page{display:none;padding:20px;max-width:1160px;margin:0 auto}
.page.active{display:block}
.pg-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.pg-hdr h2{font-size:15px;font-weight:700;color:#162844}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-lbl{font-size:11px;color:#162844;margin-bottom:3px;font-weight:600}
.kpi-val{font-size:22px;font-weight:600;color:var(--text)}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px}
.fbar{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.fbar label{font-size:11px;color:var(--text2);font-weight:500}
.fbar select,.fbar input{font-size:12px;padding:5px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);font-family:inherit}
.fbar select:focus,.fbar input:focus{outline:none;border-color:var(--gold)}
.fclear{font-size:11px;padding:5px 12px;border-radius:6px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer}
.fclear:hover{border-color:var(--gold);color:var(--gold)}
.tcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.tcard-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:0.5px solid var(--border);background:#162844}
.tcard-hdr h3{font-size:13px;font-weight:600;color:var(--gold)}
.tcard-hdr .sub{font-size:11px;color:rgba(255,255,255,0.6)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 13px;font-size:10px;font-weight:600;color:var(--gold);border-bottom:0.5px solid var(--border);background:#162844;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:9px 13px;font-size:12px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gold-bg)}
.empty{color:var(--text3);font-style:italic;text-align:center;padding:24px}
.badge{display:inline-block;padding:2px 9px;border-radius:9px;font-size:10px;font-weight:700;letter-spacing:.04em}
.b-prf{background:var(--info-bg);color:var(--info-text)}
.b-grn{background:var(--success-bg);color:var(--success-text)}
.b-pending{background:var(--warn-bg);color:var(--warn-text)}
.b-approved{background:var(--success-bg);color:var(--success-text)}
.b-rejected{background:var(--danger-bg);color:var(--danger-text)}
.abtn{font-size:11px;padding:4px 11px;border-radius:6px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-family:inherit;transition:all .12s}
.abtn:hover{border-color:var(--gold);color:var(--gold)}
.abtn.gold{background:var(--gold);border-color:var(--gold);color:#fff}
.abtn.gold:hover{background:var(--gold-light)}
.submitbtn{width:100%;margin-top:14px;padding:11px;background:var(--gold);border:none;border-radius:var(--radius);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.submitbtn:hover{background:var(--gold-light)}
.submitbtn:disabled{background:#ccc;cursor:not-allowed}
.fcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:26px;max-width:820px}
.fc-title{font-size:14px;font-weight:700;margin-bottom:1px;letter-spacing:.01em;color:#162844}
.fc-sub{font-size:11px;color:var(--text2);margin-bottom:20px}
.fsec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--gold)}
.frow{display:grid;gap:12px;margin-bottom:12px}
.fr2{grid-template-columns:1fr 1fr}
.fr3{grid-template-columns:1fr 1fr 1fr}
.fr4{grid-template-columns:1fr 1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.field label .req{color:var(--danger-text)}
.field input,.field select,.field textarea{font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.field input[readonly]{color:var(--text3)}
.itable{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.itable th{text-align:left;padding:7px 8px;font-size:10px;color:var(--gold);border-bottom:0.5px solid var(--border);font-weight:600;background:#162844;text-transform:uppercase;letter-spacing:.04em}
.itable td{padding:6px 8px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.itable input{width:100%;font-size:12px;padding:5px 6px;border:0.5px solid var(--border2);border-radius:4px;background:var(--surface2);color:var(--text);font-family:inherit}
.itable input:focus{outline:none;border-color:var(--gold)}
.add-row-btn{font-size:11px;padding:5px 14px;border-radius:6px;border:0.5px solid var(--gold);background:var(--gold-bg);color:var(--gold);cursor:pointer;font-family:inherit}
.del-row{background:none;border:none;color:var(--danger-text);cursor:pointer;font-size:14px;padding:2px 6px}
.sig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}
.sig-box{border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px}
.sig-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--gold)}
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.moverlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:24px;width:720px;max-width:100%;margin-bottom:40px;box-shadow:0 8px 32px rgba(0,0,0,0.15);position:relative;z-index:1001}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid var(--border)}
.modal-hdr h3{font-size:14px;font-weight:700;color:#162844}
.mactions{display:flex;gap:8px;align-items:center}
.printbtn{font-size:11px;padding:5px 12px;border-radius:6px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:inherit}
.printbtn:hover{border-color:var(--gold);color:var(--gold)}
.mclose{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);line-height:1;padding:2px 6px}
.mclose:hover{color:var(--danger-text)}
.di{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.di .dk{font-size:10px;color:#162844;margin-bottom:1px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.di .dv{font-size:13px;font-weight:500}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.toast{position:fixed;bottom:22px;right:22px;background:var(--success-bg);color:var(--success-text);border:0.5px solid #b0d88a;padding:11px 18px;border-radius:var(--radius);font-size:12px;font-weight:500;z-index:300;transform:translateY(60px);opacity:0;transition:all .22s;pointer-events:none}
.toast.err{background:var(--danger-bg);color:var(--danger-text);border-color:#f09595}
.toast.show{transform:translateY(0);opacity:1}
@media print{.nav,.fbar,.abtn,.submitbtn,.add-row-btn{display:none!important}.page{display:block!important}}
.nav{display:none}
.page{display:none}
#loading{display:none}
</style>
<style id="boot-hide">
.nav,.page,#loading{display:none!important}
</style>
</head>
<body>



<div id="pin-overlay">
  <div id="pin-box">
    <div id="pin-entity-name"></div>
    <div id="pin-subtitle">Enter Access Code</div>
    <div id="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div id="pin-error"></div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinDel()">&#9003;</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key del" onclick="pinClear()">C</button>
    </div>
    <button class="pin-cancel" onclick="pinCancel()">Cancel</button>
  </div>
</div>

<div class="nav" id="main-nav" style="display:none">
  <div class="entity-badge" onclick="returnToLanding()" title="Switch entity">
    <div class="entity-badge-dot" id="eb-dot"></div>
    <div class="entity-badge-name" id="eb-name">&#8212;</div>
    <div class="entity-badge-change">&#9662;</div>
  </div>
  <div class="nav-brand" id="nav-brand"><span>Procurement</span></div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="go('sub-prf')">+ New PRF</button>
    <button class="nav-tab" onclick="go('sub-grn')">+ New GRN</button>
    <button class="nav-tab active" onclick="go('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="go('prf-tracker')">PRF Tracker <span class="ntag ntag-p" id="prf-cnt">0</span></button>
    <button class="nav-tab" onclick="go('grn-tracker')">GRN Tracker <span class="ntag ntag-g" id="grn-cnt">0</span></button>
    <button class="nav-tab" onclick="go('status')">Update Status</button>
  </div>
</div>

<div id="loading" style="display:none">
  <div class="logo">Samsons <span>Procurement</span></div>
  <div class="sub">Loading data...</div>
  <div class="bar"><div class="bar-inner"></div></div>
</div>

<div id="pages-container"></div>

<div class="moverlay" id="moverlay" onclick="closeMO(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="m-title">Record Detail</h3>
      <div class="mactions"><button class="printbtn" onclick="doPrint()">Print / Download PDF</button><button class="mclose" onclick="closeMD()">&#x2715;</button></div>
    </div>
    <div id="m-body"></div>
  </div>
</div>

<div class="moverlay" id="appr-overlay" onclick="closeApprO(event)">
  <div class="modal" style="max-width:520px">
    <div class="modal-hdr">
      <div><h3 id="appr-title" style="margin-bottom:2px">Update Approval Stage</h3><div id="appr-subtitle" style="font-size:11px;color:var(--text2)"></div></div>
      <button class="mclose" onclick="closeApprD()">&#x2715;</button>
    </div>
    <div id="appr-summary" style="background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:13px 15px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"></div>
    <input type="hidden" id="appr-ref">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2);margin-bottom:5px">Finance Approval <span style="color:var(--danger-text)">*</span></div>
        <select id="appr-fin" style="width:100%;font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit"><option value="Pending">Pending</option><option value="Approved">Approved</option><option value="Rejected">Rejected</option></select>
        <input type="text" id="appr-fin-by" placeholder="Finance approver name" style="width:100%;margin-top:6px;font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);font-family:inherit">
      </div>
      <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2);margin-bottom:5px">GM Approval</div>
        <select id="appr-gm" style="width:100%;font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit"><option value="Not Required">Not Required</option><option value="Pending">Pending</option><option value="Approved">Approved</option><option value="Rejected">Rejected</option></select>
        <input type="text" id="appr-gm-by" placeholder="GM name" style="width:100%;margin-top:6px;font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);font-family:inherit">
      </div>
    </div>
    <div style="margin-bottom:16px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2);margin-bottom:5px">Notes (optional)</div>
      <textarea id="appr-notes" rows="2" style="width:100%;font-size:12px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text);font-family:inherit;resize:vertical"></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="submitbtn" style="margin-top:0;background:var(--surface2);color:var(--text);border:0.5px solid var(--border2)" onclick="closeApprD()">Cancel</button>
      <button class="submitbtn" id="appr-save-btn" style="margin-top:0" onclick="saveApproval()">Save Approval</button>
    </div>
  </div>
</div>

<div class="moverlay" id="move-overlay" onclick="closeMoveO(event)">
  <div class="modal" style="max-width:440px">
    <div class="modal-hdr">
      <div><h3 id="move-title">Move to Different Entity</h3><div id="move-subtitle" style="font-size:11px;color:var(--text2)"></div></div>
      <button class="mclose" onclick="closeMoveD()">&#x2715;</button>
    </div>
    <div id="move-summary" style="background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--text2)"></div>
    <input type="hidden" id="move-ref"><input type="hidden" id="move-type">
    <div style="margin-bottom:20px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text2);margin-bottom:8px">Move to Entity</div>

let PIN_ENTRY  = '';

function promptEntityPin(name) {
  PIN_TARGET = name;
  PIN_ENTRY  = '';
  const cfg = ENTITIES[name];
  document.getElementById('pin-entity-name').textContent = name;
  document.getElementById('pin-entity-name').style.color = cfg.color;
  document.getElementById('pin-error').textContent = '';
  updatePinDots();
  document.getElementById('pin-overlay').classList.add('open');
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('pd' + i).classList.toggle('filled', i < PIN_ENTRY.length);
  }
}

function pinKey(digit) {
  if (PIN_ENTRY.length >= 4) return;
  PIN_ENTRY += digit;
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  if (PIN_ENTRY.length === 4) {
    setTimeout(validatePin, 120); // brief delay so last dot fills visibly
  }
}

function pinDel() {
  PIN_ENTRY = PIN_ENTRY.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}

function pinClear() {
  PIN_ENTRY = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}

function validatePin() {
  if (PIN_ENTRY === ENTITY_PINS[PIN_TARGET]) {
    document.getElementById('pin-overlay').classList.remove('open');
    PIN_ENTRY = '';
    selectEntity(PIN_TARGET);
  } else {
    document.getElementById('pin-error').textContent = 'Incorrect code — please try again';
    PIN_ENTRY = '';
    updatePinDots();
  }
}

function pinCancel() {
  document.getElementById('pin-overlay').classList.remove('open');
  PIN_ENTRY  = '';
  PIN_TARGET = null;
}

// ═══════════════════════════════════════════════════════ GAS FETCH (text/plain to avoid CORS preflight)
async function gasPost(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  });
  return res.json();
}

// ═══════════════════════════════════════════════════════ LOAD ALL DATA
async function loadAll() {
  try {
    const res = await gasPost({ action: 'getAll', entity: ACTIVE_ENTITY });
    if (res.ok) {
      STATE.prfs = res.prfs || [];
      STATE.grns = res.grns || [];
      STATE.slog = res.slog || [];
      STATE.loaded = true;
    } else {
      toast('Error loading data: ' + (res.error || 'unknown'), true);
    }
  } catch (e) {
    toast('Could not connect to server. Check GAS_URL in config.', true);
  }
  counts(); depts(); rdash();
  document.getElementById('loading').style.display = 'none';
}

// ═══════════════════════════════════════════════════════ NAVIGATION
function go(id) {
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display='none'; });
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  var pg = document.getElementById('page-' + id); pg.classList.add('active'); pg.style.display='block';
  const order = ['sub-prf','sub-grn','dashboard','prf-tracker','grn-tracker','status'];
  const idx = order.indexOf(id);
  if (idx >= 0) document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  counts(); depts();
  if (id === 'dashboard') {
    document.getElementById('dash-title').textContent = (ACTIVE_ENTITY || '') + ' — All Submissions';
    rdash();
  }
  if (id === 'sub-prf') {
    if (!document.getElementById('prf-ibody').hasChildNodes()) addPRFRow();
  }
  if (id === 'sub-grn') {
    if (!document.getElementById('grn-ibody').hasChildNodes()) addGRNRow();
  }
  if (id === 'prf-tracker') rprf();
  if (id === 'grn-tracker') rgrn();
  if (id === 'status') renderSlog();
}

function counts() {
  const all = [...STATE.prfs, ...STATE.grns];
  const se = id => document.getElementById(id);
  if (se('prf-cnt')) se('prf-cnt').textContent = STATE.prfs.length;
  if (se('grn-cnt')) se('grn-cnt').textContent = STATE.grns.length;
  if (se('k-total')) se('k-total').textContent = all.length;
  if (se('k-pend')) se('k-pend').textContent = all.filter(r => r.status === 'Pending').length;
  if (se('k-appr')) se('k-appr').textContent = all.filter(r => r.status === 'Approved').length;
  const gv = STATE.grns.reduce((s, r) => s + (r.total || 0), 0);
  if (se('k-val')) se('k-val').textContent = 'PKR ' + gv.toLocaleString();
}
function depts() {
  const ds = [...new Set([...STATE.prfs, ...STATE.grns].map(r => r.dept))].filter(Boolean).sort();
  ['df-dept','pf-d','gf-d'].forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    const v = el.value;
    el.innerHTML = '<option value="">All</option>';
    ds.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; el.appendChild(o); });
    el.value = v;
  });
}

function rdash() {
  const tp = gv('df-type'), st = gv('df-status'), dp = gv('df-dept'), q = gv('df-q').toLowerCase();
  let rows = [];
  STATE.prfs.forEach(r => rows.push({ ...r, _t: 'PRF', person: r.reqName, valStr: '—' }));
  STATE.grns.forEach(r => rows.push({ ...r, _t: 'GRN', person: r.recBy || '—', valStr: 'PKR ' + (r.total || 0).toLocaleString() }));
  rows.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  if (st) rows = rows.filter(r => r.status === st);

  if (q) rows = rows.filter(r =>
    (r.ref || '').toLowerCase().includes(q) ||
    (r.person || '').toLowerCase().includes(q) ||
    (r.supplier || '').toLowerCase().includes(q) ||
    (r.prfRef || '').toLowerCase().includes(q)
  );

function approvalBadge(val) {
  if (!val || val === 'Pending')      return '<span class="badge b-pending">Pending</span>';
  if (val === 'Approved')             return '<span class="badge b-approved">Approved</span>';
  if (val === 'Rejected')             return '<span class="badge b-rejected">Rejected</span>';
  if (val === 'Not Required')         return '<span class="badge" style="background:#f0ede8;color:var(--text2)">Not Required</span>';
  return '<span class="badge b-pending">' + val + '</span>';
}
function rprf() {

  if (gm)  rows = rows.filter(r => (r.gmApproval || 'Pending') === gm);
  if (dp)  rows = rows.filter(r => r.dept === dp);

  tb.innerHTML = rows.map(r => {

    const itemCount = (r.items || []).length;

  const tr = document.createElement('tr');

    <td><button class="delrow" onclick="this.closest('tr').remove()">&#x2715;</button></td>`;
  document.getElementById('prf-ibody').appendChild(tr);
}

async function subPRF() {
  const date = gv('prf-date'), req = gv('prf-req'), dept = gv('prf-dept'), reason = gv('prf-reason');
  if (!date || !req || !dept) { toast('Complete all required fields (Date, Requester, Department).', true); return; }
  const rows = document.querySelectorAll('#prf-ibody tr');
  if (!rows.length) { toast('Add at least one item.', true); return; }
  const sigReq = gv('prf-s-req'), sigHOD = gv('prf-s-hod'), sigStore = gv('prf-s-store');
  if (!sigReq)   { toast('Requested By name is required in the Signatures section.', true); document.getElementById('prf-s-req').focus(); return; }
  if (!sigHOD)   { toast('H.O.D name is required — obtain approval before submitting.', true); document.getElementById('prf-s-hod').focus(); return; }
  if (!sigStore) { toast('Store Incharge name is required — obtain confirmation before submitting.', true); document.getElementById('prf-s-store').focus(); return; }
  const items = [];
  rows.forEach((tr, i) => {
    const c = tr.querySelectorAll('input');
    items.push({ sr: i + 1, desc: c[1].value || '—', unit: c[2].value || '—', qty: parseFloat(c[3].value) || 0 });
  });
  const payload = {
    action: 'submitPRF',
    entity: ACTIVE_ENTITY,
    date, reqName: req, dept, reason, items,
    sigReq, sigHOD, sigStore
  };
  const btn = document.querySelector('#page-sub-prf .submitbtn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  try {
    const res = await gasPost(payload);
    if (res.ok) {
      if (!res.record.entity) res.record.entity = ACTIVE_ENTITY;
      STATE.prfs.unshift(res.record);
      counts();
      toast('PRF submitted: ' + res.record.ref);
      resetPRF();
      setTimeout(() => go('prf-tracker'), 1400);
    } else {
      toast('Submit failed: ' + (res.error || 'unknown'), true);
    }
  } catch (e) { toast('Network error — could not submit.', true); }
  btn.disabled = false; btn.textContent = 'Submit PRF';
}

function resetPRF() {
  ['prf-date','prf-req','prf-reason','prf-s-req','prf-s-req-sign','prf-s-hod','prf-s-hod-sign','prf-s-store','prf-s-store-sign'].forEach(id => { const e = document.getElementById(id); if (e) e.value = ''; });
  document.getElementById('prf-dept').value = '';
  document.getElementById('prf-ibody').innerHTML = '';
  prfRowN = 0;
}

  grnRowN++;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" value="${grnRowN}" style="width:36px;text-align:center"></td>
    <td><input type="text" placeholder="Item description" oninput="calcGRN()"></td>
    <td><input type="text" placeholder="Inv. ref."></td>
    <td><input type="text" placeholder="No/Set/LTR"></td>
    <td><input type="number" min="0" placeholder="Qty" oninput="calcGRN()"></td>
    <td><input type="number" min="0" placeholder="0.00" oninput="calcGRN()"></td>
    <td><input type="text" readonly placeholder="—"></td>
    <td><button class="delrow" onclick="this.closest('tr').remove();calcGRN()">&#x2715;</button></td>`;
  document.getElementById('grn-ibody').appendChild(tr);

function calcGRN() {
  let tot = 0;
  document.querySelectorAll('#grn-ibody tr').forEach(tr => {
    const c = tr.querySelectorAll('input');
    const qty = parseFloat(c[4].value) || 0;
    const up = parseFloat(c[5].value) || 0;
    const line = qty * up;
    c[6].value = line > 0 ? 'Rs ' + line.toLocaleString() : '';
    tot += line;
  });
  document.getElementById('grn-tot').textContent = 'Rs ' + tot.toLocaleString();
}

async function subGRN() {
  const date = gv('grn-date'), dept = gv('grn-dept'), supplier = gv('grn-supplier');
  if (!date || !dept || !supplier) { toast('Complete all required fields (Date, Department, Supplier).', true); return; }
  const rows = document.querySelectorAll('#grn-ibody tr');
  if (!rows.length) { toast('Add at least one item.', true); return; }
  const items = [];
  rows.forEach((tr, i) => {
    const c = tr.querySelectorAll('input');
    const qty = parseFloat(c[4].value) || 0;
    const up = parseFloat(c[5].value) || 0;
    items.push({ sr: i + 1, desc: c[1].value || '—', invRef: c[2].value || '', uom: c[3].value || '—', qty, up, total: qty * up });
  });
  const total = items.reduce((s, x) => s + x.total, 0);
  const payload = {
    action: 'submitGRN',
    entity: ACTIVE_ENTITY,
    date, prfRef: gv('grn-prf'), dept, supplier,
    invoiceRef: gv('grn-challan'), items, total,
    remarks: gv('grn-remarks'),
    recBy: gv('grn-rec'), qtyBy: gv('grn-qty'), qualBy: gv('grn-qual'),
    rateBy: gv('grn-rate'), storeBy: gv('grn-store'), acctBy: gv('grn-acct')
  };
  const btn = document.querySelector('#page-sub-grn .submitbtn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  try {
    const res = await gasPost(payload);
    if (res.ok) {
      if (!res.record.entity) res.record.entity = ACTIVE_ENTITY;
      STATE.grns.unshift(res.record);
      counts();
      toast('GRN submitted: ' + res.record.ref);
      resetGRN();
      setTimeout(() => go('grn-tracker'), 1400);
    } else {
      toast('Submit failed: ' + (res.error || 'unknown'), true);
    }
  } catch (e) { toast('Network error — could not submit.', true); }
  btn.disabled = false; btn.textContent = 'Submit GRN';
}

function resetGRN() {
  ['grn-date','grn-prf','grn-supplier','grn-challan','grn-remarks',
   'grn-rec','grn-rec-s','grn-qty','grn-qty-s','grn-qual','grn-qual-s',
   'grn-rate','grn-rate-s','grn-store','grn-store-s','grn-acct','grn-acct-s'
  ].forEach(id => { const e = document.getElementById(id); if (e) e.value = ''; });
  document.getElementById('grn-dept').value = '';
  document.getElementById('grn-ibody').innerHTML = '';
  grnRowN = 0;
  calcGRN();
}

// ═══════════════════════════════════════════════════════ STATUS UPDATE
async function doStatus() {
  const ref = gv('us-ref').toUpperCase();
  const ns = gv('us-st');
  const notes = gv('us-notes');
  if (!ref || !ns) { toast('Enter a reference number and select new status.', true); return; }
  const res = await gasPost({ action: 'updateStatus', entity: ACTIVE_ENTITY, ref, status: ns, notes });
  if (res.ok) {
    // Update local state
    const arr = ref.startsWith('PRF') ? STATE.prfs : STATE.grns;
    const rec = arr.find(r => r.ref === ref);
    if (rec) { const old = rec.status; rec.status = ns; STATE.slog.unshift({ ref, type: ref.startsWith('PRF') ? 'PRF' : 'GRN', old, ns, notes, at: new Date().toLocaleString() }); }
    ['us-ref','us-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('us-st').value = '';
    renderSlog(); counts();
    toast(ref + ' updated to ' + ns);
  } else {
    toast('Update failed: ' + (res.error || 'Ref not found'), true);
  }
}

function renderSlog() {
  const tb = document.getElementById('slog-tbody');
  if (!STATE.slog.length) { tb.innerHTML = '<tr><td colspan="6" class="empty">No status updates logged yet</td></tr>'; return; }
  tb.innerHTML = STATE.slog.slice(0, 40).map(l => `<tr>
    <td><strong>${l.ref}</strong></td>
    <td><span class="badge b-${(l.type || '').toLowerCase()}">${l.type || '—'}</span></td>
    <td><span class="badge b-${(l.old || '').toLowerCase()}">${l.old || '—'}</span></td>
    <td><span class="badge b-${(l.ns || '').toLowerCase()}">${l.ns || '—'}</span></td>
    <td style="font-size:11px;color:var(--text2)">${l.notes || '—'}</td>
    <td style="font-size:11px">${l.at || '—'}</td>
  </tr>`).join('');
}

async function saveApproval() {
  const ref         = document.getElementById('appr-ref').value;
  const finApproval = document.getElementById('appr-fin').value;
  const gmApproval  = document.getElementById('appr-gm').value;
  const finBy       = document.getElementById('appr-fin-by').value.trim();
  const gmBy        = document.getElementById('appr-gm-by').value.trim();
  const notes       = document.getElementById('appr-notes').value.trim();
  if (!ref) return;

  const btn = document.getElementById('appr-save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    const res = await gasPost({ action: 'updateApproval', entity: ACTIVE_ENTITY, ref, financeApproval: finApproval, gmApproval, financeApprovedBy: finBy, gmApprovedBy: gmBy, approvalNotes: notes });
    if (res.ok) {
      // Update local state immediately so dashboard + tracker refresh without reload
      const rec = STATE.prfs.find(x => x.ref === ref);
      if (rec) {
        rec.financeApproval   = finApproval;
        rec.gmApproval        = gmApproval;
        rec.financeApprovedBy = finBy;
        rec.gmApprovedBy      = gmBy;
        rec.approvalNotes     = notes;
      }
      closeApprD();
      // Remove reason banner if present
      const banner = document.getElementById('appr-reason-banner');
      if (banner) banner.remove();
      // Refresh whichever tracker is visible
      rprf();
      rdash();
      toast('Approval updated for ' + ref);
    } else {
      toast('Update failed: ' + (res.error || 'unknown'), true);
    }
  } catch(e) { toast('Network error — could not save.', true); }
  btn.disabled = false; btn.textContent = 'Save Approval';
}

  document.querySelectorAll('#move-entity-grid button').forEach(b => {

    btn.style.borderColor = ENTITIES[name].color;
    btn.style.background  = 'rgba(0,0,0,0.04)';

  const type   = document.getElementById('move-type').value;
  const target = document.getElementById('move-save-btn').dataset.target;
  const reason = document.getElementById('move-reason').value.trim();

  if (!target) { toast('Please select a target entity.', true); return; }

  const btn = document.getElementById('move-save-btn');
  btn.disabled = true; btn.textContent = 'Moving...';

  try {
    const res = await gasPost({ action: 'moveRecord', ref, type, fromEntity: ACTIVE_ENTITY, toEntity: target, reason });
    if (res.ok) {
      // Remove from local STATE — it now belongs to another entity
      if (type === 'PRF') STATE.prfs = STATE.prfs.filter(r => r.ref !== ref);
      else                STATE.grns = STATE.grns.filter(r => r.ref !== ref);
      closeMoveD();
      rdash(); rprf(); rgrn(); counts();
      toast(ref + ' moved to ' + target);
    } else {
      toast('Move failed: ' + (res.error || 'unknown'), true);
    }
  } catch(e) { toast('Network error — could not move record.', true); }
  btn.disabled = false; btn.textContent = 'Move Record';
}

// ═══════════════════════════════════════════════════════ UTILS
function gv(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }
function esc(s) { return (s || '').replace(/'/g, "\\'"); }
function toast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════ GLOBAL CLICK HELPERS
// These are called directly from onclick attributes using btoa-encoded refs
// to safely handle any characters in the ref string.
window.viewRecord   = function(enc)    { const r=atob(enc).split('|'); openM(r[0], r[1]); };
window.approveRecord= function(enc)    { openApprovalPanel(atob(enc)); };
window.openApproval = function(enc)    { closeModalDirect(); openApprovalPanel(atob(enc)); };
window.moveRecord   = function(enc)    { const r=atob(enc).split('|'); openMovePanel(r[0], r[1]); };

// ═══════════════════════════════════════════════════════ INIT
// Row init moved to after page injection

// Move modals to be the very last children of <body> so no sibling
// stacking context (overflow:hidden, transforms, etc.) can clip them.
(function hoistModals() {
  ['moverlay','appr-overlay','move-overlay','pin-overlay'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el && el.parentNode !== document.body) {
      document.body.appendChild(el);
    } else if (el) {
      // Even if already in body, move to end to ensure last in stacking order
      document.body.appendChild(el);
    }
  });
})();

// Don't auto-load — wait for entity selection
// loadAll is called by selectEntity()
// Keep loading screen hidden on start (entity landing is shown instead)
document.getElementById('loading').style.display = 'none';

</script>
